name: CI/CD Completo - VZeta

on:
  push:
    branches:
      - main

jobs:
  # ETAPA 1: Integración Continua (CI) - Construir y subir a Docker Hub
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Autenticacion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Construir y Subir Imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # REEMPLAZA 'tu-usuario-docker' por tu usuario real
          tags: jotape2001/vzeta-web:latest

  # ETAPA 2: Despliegue Continuo (CD) - Conectarse a AWS y actualizar
  deploy-to-aws:
    runs-on: ubuntu-latest
    needs: build-and-push # Espera a que la imagen se suba con éxito antes de desplegar

    steps:
      - name: Ejecutar comandos remotos via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            # 1. Detener y eliminar el contenedor viejo si es que ya existe
            docker stop web-vzeta || true
            docker rm web-vzeta || true
            
            # 2. Descargar la ultima version de la imagen desde Docker Hub
            # REEMPLAZA 'tu-usuario-docker' por tu usuario real
            docker pull jotape2001/vzeta-web:latest
            
            # 3. Encender el nuevo contenedor corriendo Nginx en el puerto 80
            docker run -d --name web-vzeta -p 80:80 jotape2001/vzeta-web:latest
